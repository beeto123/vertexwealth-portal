<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Vertex Wealth Group</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="logo">Vertex Wealth Group - Admin</div>
      <div class="nav-links">
        <button id="logoutBtn" style="background:#c0392b; color:white; padding:8px 15px; width:auto;">Logout</button>
      </div>
    </div>

    <div id="adminContent">
      <div class="loading">Loading admin panel...</div>
    </div>

    <div class="footer">
      <p>Vertex Wealth Group | Restricted Access</p>
    </div>
  </div>

  <script>
    async function checkAdmin() {
      const res = await fetch('/api/admin/check');
      const data = await res.json();
      if (!data.isAdmin) {
        window.location.href = '/admin-login.html';
      } else {
        loadAdminPanel();
      }
    }

    async function loadAdminPanel() {
      // Load investors first
      const investorsRes = await fetch('/api/admin/investors');
      const investors = await investorsRes.json();
      
      // Load withdrawals
      const withdrawalsRes = await fetch('/api/admin/withdrawals');
      const withdrawals = await withdrawalsRes.json();
      
      // Load central wallet
      const walletRes = await fetch('/api/central-wallet');
      const walletData = await walletRes.json();
      
      const html = `
        <!-- Generate Investor -->
        <div class="admin-section">
          <h3>➕ Generate New Investor</h3>
          <div class="form-grid">
            <input type="text" id="newName" placeholder="Full Name">
            <input type="email" id="newEmail" placeholder="Email Address">
            <input type="number" id="newDeposit" placeholder="Initial Deposit (USD)" step="0.01" value="0">
          </div>
          <button id="generateBtn">Generate Code & Email Investor</button>
          <div id="genResult"></div>
        </div>

        <!-- Add Deposit -->
        <div class="admin-section">
          <h3>💰 Add Deposit</h3>
          <div class="form-grid">
            <select id="depositInvestor">
              <option value="">Select Investor</option>
              ${investors.map(i => `<option value="${i.unique_code}|${i.name}|${i.email}">${i.name} (${i.unique_code}) - Balance: $${i.balance}</option>`).join('')}
            </select>
            <input type="number" id="depositAmount" placeholder="Amount (USD)" step="0.01">
          </div>
          <button id="addDepositBtn">Add Deposit</button>
          <div id="depositResult"></div>
        </div>

        <!-- Add ROI -->
        <div class="admin-section">
          <h3>📈 Add ROI (Profit)</h3>
          <div class="form-grid">
            <select id="roiInvestor">
              <option value="">Select Investor</option>
              ${investors.map(i => `<option value="${i.unique_code}|${i.name}|${i.email}">${i.name} (${i.unique_code}) - Balance: $${i.balance}</option>`).join('')}
            </select>
            <input type="number" id="roiAmount" placeholder="Amount (USD)" step="0.01">
          </div>
          <button id="addRoiBtn">Add ROI</button>
          <div id="roiResult"></div>
        </div>

        <!-- Pending Withdrawals -->
        <div class="admin-section">
          <h3>⏳ Pending Withdrawals</h3>
          <div id="withdrawalsList">
            ${withdrawals.length === 0 ? '<p>No pending withdrawals.</p>' : `
              <table>
                <thead><tr><th>Investor</th><th>Amount</th><th>Wallet</th><th>Actions</th></tr></thead>
                <tbody>
                  ${withdrawals.map(w => `
                    <tr>
                      <td>${w.investor_name}</td>
                      <td>$${w.amount}</td>
                      <td style="word-break:break-all;">${w.wallet_address}</td>
                      <td>
                        <button class="success" style="width:auto; margin-right:5px;" onclick="approveWithdrawal(${w.id}, '${w.investor_code}', ${w.amount}, '${w.investor_email}', '${w.investor_name}')">Approve</button>
                        <button class="danger" style="width:auto;" onclick="rejectWithdrawal(${w.id}, '${w.investor_email}', '${w.investor_name}', ${w.amount})">Reject</button>
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            `}
          </div>
        </div>

        <!-- All Investors -->
        <div class="admin-section">
          <h3>👥 All Investors</h3>
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Name</th><th>Code</th><th>Email</th><th>Balance</th><th>ROI</th></tr></thead>
              <tbody>
                ${investors.map(i => `
                  <tr>
                    <td>${i.name}</td>
                    <td>${i.unique_code}</td>
                    <td>${i.email}</td>
                    <td>$${i.balance}</td>
                    <td>$${i.roi_earned}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- Settings -->
        <div class="admin-section">
          <h3>⚙️ Settings</h3>
          <p>Central USDT Wallet Address:</p>
          <div class="form-grid">
            <input type="text" id="centralWalletInput" value="${walletData.wallet}" placeholder="USDT Wallet Address">
            <button id="updateWalletBtn">Update Wallet</button>
          </div>
          <div id="walletResult"></div>
        </div>
      `;
      
      document.getElementById('adminContent').innerHTML = html;
      
      // Attach event listeners
      document.getElementById('generateBtn')?.addEventListener('click', generateInvestor);
      document.getElementById('addDepositBtn')?.addEventListener('click', addDeposit);
      document.getElementById('addRoiBtn')?.addEventListener('click', addRoi);
      document.getElementById('updateWalletBtn')?.addEventListener('click', updateWallet);
    }

    async function generateInvestor() {
      const name = document.getElementById('newName').value;
      const email = document.getElementById('newEmail').value;
      const deposit = document.getElementById('newDeposit').value;
      
      if (!name || !email) {
        alert('Name and email required');
        return;
      }
      
      const res = await fetch('/api/generate-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, initial_deposit: deposit })
      });
      
      const data = await res.json();
      if (data.success) {
        document.getElementById('genResult').innerHTML = `<div class="success">✅ Code ${data.code} sent to ${email}</div>`;
        setTimeout(() => location.reload(), 1500);
      } else {
        document.getElementById('genResult').innerHTML = `<div class="error">Error: ${data.error}</div>`;
      }
    }

    async function addDeposit() {
      const [code, name, email] = document.getElementById('depositInvestor').value.split('|');
      const amount = document.getElementById('depositAmount').value;
      
      if (!code || !amount) {
        alert('Select investor and enter amount');
        return;
      }
      
      await fetch('/api/admin/add-deposit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ investor_code: code, investor_name: name, amount, investor_email: email })
      });
      
      document.getElementById('depositResult').innerHTML = '<div class="success">✅ Deposit added</div>';
      setTimeout(() => location.reload(), 1000);
    }

    async function addRoi() {
      const [code, name, email] = document.getElementById('roiInvestor').value.split('|');
      const amount = document.getElementById('roiAmount').value;
      
      if (!code || !amount) {
        alert('Select investor and enter amount');
        return;
      }
      
      await fetch('/api/admin/add-roi', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ investor_code: code, investor_name: name, amount, investor_email: email, plan_type: 'manual' })
      });
      
      document.getElementById('roiResult').innerHTML = '<div class="success">✅ ROI added</div>';
      setTimeout(() => location.reload(), 1000);
    }

    window.approveWithdrawal = async (id, code, amount, email, name) => {
      if (!confirm(`Approve $${amount} withdrawal?`)) return;
      await fetch('/api/admin/approve-withdrawal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transaction_id: id, investor_code: code, amount, investor_email: email, investor_name: name })
      });
      location.reload();
    };

    window.rejectWithdrawal = async (id, email, name, amount) => {
      const reason = prompt('Reason for rejection:');
      if (!reason) return;
      await fetch('/api/admin/reject-withdrawal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transaction_id: id, reason, investor_email: email, investor_name: name, amount })
      });
      location.reload();
    };

    async function updateWallet() {
      const wallet = document.getElementById('centralWalletInput').value;
      await fetch('/api/admin/update-wallet', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ wallet_address: wallet })
      });
      document.getElementById('walletResult').innerHTML = '<div class="success">✅ Wallet updated</div>';
    }

    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
      await fetch('/api/admin/logout', { method: 'POST' });
      window.location.href = '/admin-login.html';
    });

    checkAdmin();
  </script>
</body>
</html>
